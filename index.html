<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#cba6f7">
  <meta name="description" content="用間隔重複法複習英語單字，支援離線使用">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="英語複習">
  <title>英語單字複習系統</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

<!-- ── 頂部導覽列 ─────────────────────────────── -->
<nav class="top-nav">
  <span class="nav-title">📚 英語複習</span>
  <div style="display:flex;gap:12px;align-items:center">
    <button id="btn-sync" class="btn btn-secondary" style="padding:6px 12px;font-size:12px" title="同步資料">
      🔄 同步
    </button>
    <button id="btn-login" class="btn btn-primary" style="padding:6px 12px;font-size:12px">
      登入
    </button>
  </div>
</nav>

<!-- ── 待複習 Banner（iOS 替代推播） ──────────── -->
<div class="review-banner hidden" id="review-banner">
  <div class="banner-text">
    <strong id="banner-count">0</strong> 個單字待複習
  </div>
  <button class="banner-btn" id="banner-start-btn">開始複習</button>
</div>

<!-- ── 主頁面容器 ────────────────────────────── -->
<div class="page-wrapper">

  <!-- 尚未登入提示 -->
  <div class="login-screen" id="login-screen">
    <div class="login-icon">📖</div>
    <div class="login-title">英語單字複習系統</div>
    <div class="login-desc">
      登入 Google 帳號，從你的 Google Sheets 讀取單字，用科學的方式永久記憶英語詞彙
    </div>
    <button class="btn btn-primary btn-lg" id="btn-login-main">
      🔑 使用 Google 登入
    </button>
    <div style="font-size:12px;color:var(--color-overlay0);margin-top:-4px">
      資料儲存在你自己的 Google Sheets，安全無虞
    </div>
  </div>

  <!-- 已登入主內容（初始隱藏） -->
  <div id="main-content" style="display:none">

    <!-- 今日統計 -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="stat-today">—</div>
        <div class="stat-label">今日待複習</div>
      </div>
      <div class="stat-card">
        <div class="stat-number green" id="stat-familiar">—</div>
        <div class="stat-label">已熟悉</div>
      </div>
      <div class="stat-card">
        <div class="stat-number blue" id="stat-total">—</div>
        <div class="stat-label">總單字數</div>
      </div>
      <div class="stat-card">
        <div class="stat-number yellow" id="stat-streak">—</div>
        <div class="stat-label">連續天數</div>
      </div>
    </div>

    <!-- 今日進度圓環 -->
    <div style="display:flex;align-items:center;gap:20px;margin:20px 0;
                background:var(--color-mantle);border-radius:var(--radius-lg);
                padding:16px 20px;border:1px solid var(--color-surface0)">
      <div class="progress-ring" id="progress-ring" style="--progress:0">0%</div>
      <div>
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">今日目標</div>
        <div style="font-size:13px;color:var(--color-subtext);margin-bottom:8px">
          已完成 <span id="done-today">0</span> / <span id="goal-today">10</span> 個
        </div>
        <button class="btn btn-primary" id="btn-start-review" style="padding:8px 16px;font-size:13px">
          🎯 開始複習
        </button>
      </div>
    </div>

    <!-- 學習熱力圖 -->
    <div class="heatmap-section">
      <div class="heatmap-title">📅 學習熱力圖（過去 30 天）</div>
      <div class="heatmap-container" id="heatmap-container">
        <!-- 由 heatmap.js 動態生成 SVG -->
      </div>
    </div>

    <!-- 最近新增單字 -->
    <div class="section-header">
      <div class="section-title">最近新增</div>
      <a class="section-action" href="./dashboard.html">查看全部 →</a>
    </div>
    <div class="word-preview-list" id="recent-words">
      <!-- 由 JS 動態渲染 -->
      <div class="skeleton" style="height:58px;border-radius:12px"></div>
      <div class="skeleton" style="height:58px;border-radius:12px"></div>
      <div class="skeleton" style="height:58px;border-radius:12px"></div>
    </div>

    <!-- 同步資訊 -->
    <div style="display:flex;align-items:center;justify-content:space-between;
                margin-top:24px;padding-top:16px;border-top:1px solid var(--color-surface0)">
      <div style="font-size:12px;color:var(--color-overlay0)">
        上次同步：<span id="last-sync-time">尚未同步</span>
      </div>
      <button class="btn btn-secondary" id="btn-manual-sync"
              style="padding:6px 14px;font-size:12px">
        📥 手動同步
      </button>
    </div>

  </div><!-- /main-content -->
</div><!-- /page-wrapper -->

<div class="toast-container"></div>

<script type="module">
import {
  initApp, loginWithGoogle, isLoggedIn,
  syncFromSheets, showToast, state
} from './app.js';
import { getLastSyncText } from './sheets-api.js';
import { renderHeatmap } from './heatmap.js';
import { STATUS } from './spaced-repetition.js';

// ── 初始化 ───────────────────────────────────────────────────
await initApp();

const loginScreen  = document.getElementById('login-screen');
const mainContent  = document.getElementById('main-content');
const btnLogin     = document.getElementById('btn-login');
const btnLoginMain = document.getElementById('btn-login-main');
const btnSync      = document.getElementById('btn-sync');
const btnManualSync= document.getElementById('btn-manual-sync');
const btnStartReview = document.getElementById('btn-start-review');

// ── 根據登入狀態切換顯示 ─────────────────────────────────────
function renderPage() {
  if (isLoggedIn()) {
    loginScreen.style.display = 'none';
    mainContent.style.display = 'block';
    btnLogin.textContent = '登出';
    updateStats();
    renderRecentWords();
    renderBanner();
    renderHeatmap(document.getElementById('heatmap-container'));
    document.getElementById('last-sync-time').textContent = getLastSyncText();
  } else {
    loginScreen.style.display = 'flex';
    mainContent.style.display = 'none';
    btnLogin.textContent = '登入';
  }
}

// ── 更新統計數字 ──────────────────────────────────────────────
function updateStats() {
  const words = state.allWords;
  const today = state.todayWords;
  const familiar = words.filter(w => w.reviewStatus === STATUS.FAMILIAR).length;

  document.getElementById('stat-today').textContent    = today.length;
  document.getElementById('stat-familiar').textContent = familiar;
  document.getElementById('stat-total').textContent    = words.length;

  // 計算連續複習天數
  const streak = calcStreak();
  document.getElementById('stat-streak').textContent   = streak;

  // 今日完成數（從 localStorage）
  const doneToday = parseInt(localStorage.getItem('done_today_' + getToday()) || '0', 10);
  const goal = 10;
  const pct  = Math.min(Math.round((doneToday / goal) * 100), 100);
  document.getElementById('done-today').textContent = doneToday;
  document.getElementById('goal-today').textContent = goal;
  const ring = document.getElementById('progress-ring');
  ring.style.setProperty('--progress', pct);
  ring.textContent = pct + '%';
}

// ── 渲染最近新增單字 ─────────────────────────────────────────
function renderRecentWords() {
  const container = document.getElementById('recent-words');
  const recent = [...state.allWords]
    .sort((a, b) => (b.addedDate || '').localeCompare(a.addedDate || ''))
    .slice(0, 5);

  if (recent.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📝</div>
        <div class="empty-title">還沒有單字</div>
        <div class="empty-desc">用 Chrome 擴充功能選字後儲存，單字就會出現在這裡</div>
      </div>`;
    return;
  }

  container.innerHTML = recent.map(w => `
    <div class="word-preview-card">
      <div>
        <div class="word-preview-en">${w.word}</div>
        <div class="word-preview-zh">${w.translation}</div>
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        ${w.cefr ? `<span class="badge badge-cefr-${w.cefr}">${w.cefr}</span>` : ''}
        ${w.toeic ? `<span class="badge badge-toeic">⭐</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ── 待複習 Banner（iOS 替代推播） ───────────────────────────
function renderBanner() {
  const banner = document.getElementById('review-banner');
  const count  = state.todayWords.length;
  if (count > 0) {
    document.getElementById('banner-count').textContent = count;
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }
}

// ── 工具函式 ─────────────────────────────────────────────────
function getToday() { return new Date().toISOString().split('T')[0]; }

function calcStreak() {
  const raw   = localStorage.getItem('vocab_daily_reviews') || '{}';
  const daily = JSON.parse(raw);
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().split('T')[0];
    if (daily[key]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

// ── 事件綁定 ─────────────────────────────────────────────────
btnLogin.addEventListener('click', () => {
  if (isLoggedIn()) { import('./app.js').then(m => m.logout()); }
  else loginWithGoogle();
});

btnLoginMain.addEventListener('click', loginWithGoogle);
btnSync.addEventListener('click', () => syncFromSheets(true));
btnManualSync.addEventListener('click', () => syncFromSheets(true));
btnStartReview.addEventListener('click', () => { location.href = './review.html'; });
document.getElementById('banner-start-btn').addEventListener('click',
  () => { location.href = './review.html'; });

// 資料更新後重新渲染
window.addEventListener('words-updated', () => {
  updateStats();
  renderRecentWords();
  renderBanner();
  document.getElementById('last-sync-time').textContent = getLastSyncText();
});

// 初始渲染
renderPage();
</script>
</body>
</html>
